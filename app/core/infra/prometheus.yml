global:
  scrape_interval: 15s # 抓取频率，千万级语料生产建议 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'agent-sft-forge-worker'
    static_configs:
      # host.docker.internal 指向宿主机，确保容器内的 Prometheus 能访问宿主机的 9091 端口
      - targets: ['host.docker.internal:9091']
    metrics_path: '/'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'worker-node-01'

  - job_name: 'redis_exporter' # 建议配套部署 Redis Exporter 监控令牌桶水位
    static_configs:
      - targets: ['sft-redis:6379']